<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Intelligence</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    overflow: hidden;
}

/* RADAR */
.radar {
    position: fixed;
    width: 100%;
    height: 100%;
}

.line {
    position: absolute;
    width: 100%;
    height: 2px;
    background: #00ffcc;
    top: 50%;
    transform-origin: left;
    animation: rotate 3s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* TEXT */
#typing {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 20px;
    text-shadow: 0 0 10px #00ffcc;
}
</style>
</head>

<body>

<div class="radar">
    <div class="line"></div>
</div>

<div id="typing"></div>

<script>
let text = "SYSTEM ONLINE... SCANNING THREATS...";
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text[i];
        i++;
        setTimeout(type, 50);
    }
}

type();
</script>

</body>
</html>
