<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Intelligence System</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
}

/* RADAR */
.radar {
    position: fixed;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at center, rgba(0,255,200,0.1) 0%, transparent 70%);
    overflow: hidden;
    z-index: -1;
}

.sweep {
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(0deg, transparent, #00ffcc);
    transform-origin: center;
    animation: sweep 4s linear infinite;
}

@keyframes sweep {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* HEADER */
header {
    text-align: center;
    padding: 40px;
}

h1 {
    text-shadow: 0 0 20px #00ffcc;
}

/* CARDS */
.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(0,0,0,0.7);
    border: 1px solid #00ffcc33;
    padding: 20px;
    margin: 20px;
    box-shadow: 0 0 20px #00ffcc33;
}

/* BUTTON */
.btn {
    background: #00ffcc;
    color: black;
    padding: 10px;
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
}

/* TYPING */
.typing {
    font-size: 18px;
    color: #00ffcc;
}
</style>
</head>

<body>

<div class="radar">
    <div class="sweep"></div>
</div>

<header>
    <h1>🛰️ GLOBAL INTELLIGENCE SYSTEM</h1>
    <div class="typing" id="typing"></div>
</header>

<div class="container">

    <div class="card">
        <h2>🧠 About</h2>
        <p>AI-powered OSINT system detecting threats in real time.</p>
    </div>

    <div class="card">
        <h2>🚀 Live System</h2>

        <a class="btn" href="https://share.streamlit.io/user/alantinajero" target="_blank">
            Launch System
        </a>
    </div>

    <div class="card">
        <h2>💻 GitHub</h2>

        <a class="btn" href="https://github.com/AlanTinajero" target="_blank">
            View Code
        </a>
    </div>

</div>

<script>
const text = "Initializing OSINT AI System... Threat Detection Active...";
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}

type();
</script>

</body>
</html>
