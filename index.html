<!DOCTYPE html>

<title>Alan Tinajero | Intelligence System</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
}

/* 🔥 RADAR (NO BLOQUEA CLICKS) */
.radar {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none; /* CLAVE */
}

.line {
    position: absolute;
    width: 100%;
    height: 2px;
    background: #00ffcc;
    top: 50%;
    transform-origin: left;
    animation: rotate 4s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* DRONES */
.drone {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
    box-shadow: 0 0 10px red;
}

.drone1 { animation: move1 6s linear infinite; }
.drone2 { animation: move2 8s linear infinite; }
.drone3 { animation: move3 10s linear infinite; }

@keyframes move1 {
    0% { top: 10%; left: 10%; }
    50% { top: 70%; left: 80%; }
    100% { top: 10%; left: 10%; }
}

@keyframes move2 {
    0% { top: 80%; left: 20%; }
    50% { top: 20%; left: 70%; }
    100% { top: 80%; left: 20%; }
}

@keyframes move3 {
    0% { top: 50%; left: 5%; }
    50% { top: 10%; left: 90%; }
    100% { top: 50%; left: 5%; }
}

/* ALERT */
.alert {
    background: red;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    animation: blink 0.7s infinite;
}

@keyframes blink {
    50% { opacity: 0.2; }
}

/* HEADER */
header {
    text-align: center;
    padding: 40px;
}

h1 {
    text-shadow: 0 0 15px #00ffcc;
}

.subtitle {
    color: #00d4ff;
}

/* CARDS */
.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(0,0,0,0.85);
    border: 1px solid #00ffcc33;
    padding: 20px;
    margin: 20px;
}

/* BOTONES */
.btn {
    background: #00ffcc;
    color: black;
    padding: 12px;
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>
