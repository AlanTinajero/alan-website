<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alan Tinajero | Intelligence System</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    overflow-x: hidden;
}

/* RADAR */
.radar {
    position: fixed;
    width: 100%;
    height: 100%;
}

.line {
    position: absolute;
    width: 100%;
    height: 2px;
    background: #00ffcc;
    top: 50%;
    transform-origin: left;
    animation: rotate 5s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* DRONES */
.drone {
    position: absolute;
    width: 6px;
    height: 6px;
    background: red;
    border-radius: 50%;
    animation: move 10s linear infinite;
}

@keyframes move {
    from { transform: translate(0,0); }
    to { transform: translate(100vw,100vh); }
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px;
}

h1 {
    text-shadow: 0 0 15px #00ffcc;
}

.subtitle {
    color: #00d4ff;
}

/* CARDS */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(0,0,0,0.7);
    border: 1px solid #00ffcc33;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 0 20px #00ffcc22;
}

/* BUTTON */
.btn {
    background: #00ffcc;
    color: black;
    padding: 10px;
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
}

/* ALERT */
.alert {
    background: red;
    color: white;
    padding: 10px;
    animation: blink 1s infinite;
    margin-bottom: 10px;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

/* MAP */
iframe {
    width: 100%;
    height: 400px;
    border: none;
}
</style>
</head>

<body>

<div class="radar">
    <div class="line"></div>
</div>

<!-- DRONES -->
<div class="drone" style="top:10%; left:10%;"></div>
<div class="drone" style="top:30%; left:20%;"></div>
<div class="drone" style="top:50%; left:5%;"></div>

<header>
    <h1>🛰️ GLOBAL INTELLIGENCE SYSTEM</h1>
    <div class="subtitle">Alan Tinajero | OSINT AI</div>
    <div id="typing"></div>
</header>

<div class="container">

    <div class="alert">🚨 LIVE THREAT DETECTED</div>

    <div class="card">
        <h2>🧠 About</h2>
        <p>AI-powered OSINT system detecting threats and anomalies in real time.</p>
    </div>

    <div class="card">
        <h2>🌍 Live Map Intelligence</h2>

        <iframe src="https://www.openstreetmap.org/export/embed.html"></iframe>
    </div>

    <div class="card">
        <h2>🚀 Launch System</h2>

        <a class="btn" href="https://share.streamlit.io/user/alantinajero" target="_blank">
            Open Intelligence Dashboard
        </a>
    </div>

    <div class="card">
        <h2>💻 GitHub</h2>

        <a class="btn" href="https://github.com/AlanTinajero" target="_blank">
            View Code
        </a>
    </div>

</div>

<script>
let text = "SYSTEM ACTIVE... TRACKING GLOBAL EVENTS...";
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text[i];
        i++;
        setTimeout(type, 40);
    }
}

type();
</script>

</body>
</html>
